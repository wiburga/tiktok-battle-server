<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Battle v2.0 - Pixel Arena</title>
    <meta name="description" content="Juego de batallas en tiempo real conectado a TikTok Live. Los viewers luchan como personajes pixel art.">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div id="game-container">
    <div id="top-overlay">
        <div id="rage-wrap" aria-label="Rage colectiva">
            <div id="rage-label">RAGE DEL PÚBLICO</div>
            <div id="rage-bar">
                <div id="rage-fill"></div>
            </div>
        </div>

        <div class="wins-badge">
            🏆 <span id="win-count">0</span>
        </div>
        <div class="streamer-info">
            <div class="crown">👑</div>
            <span>EDUGAMESDEV</span>
        </div>
        <div class="stats-badge">
            <span>⚔ <span id="fighter-count">0</span></span>
        </div>
        <div id="status-badge" class="stats-badge" style="margin-left: 8px; border-color: rgba(255,255,255,0.1);">
            <span id="status-dot" style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#0f0; margin-right:4px; box-shadow: 0 0 5px #0f0;"></span>
            <span id="status-text" style="font-size:9px; font-weight:bold; opacity: 0.8;">ONLINE</span>
        </div>
    </div>

    <div id="ko-text">K.O!</div>
    <div id="levelup-text"></div>
    <div id="boss-warning"></div>
    <div id="share-flash"></div>
    <div id="mega-text"></div>

    <div id="podium-modal" role="dialog" aria-modal="true" aria-label="Podio de ganadores">
        <div class="podium-card">
            <div class="podium-title">TOP 3 JUGADORES</div>
            <div id="podium-list"></div>
            <div class="podium-sub">Se calcula por daño al BOSS + apoyo con regalos</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="test-controls">
        <button class="test-btn" onclick="test('comment')">COMMENT</button>
        <button class="test-btn" onclick="test('gift')">GIFT</button>
        <button class="test-btn" onclick="test('like')">LIKE</button>
        <button class="test-btn" onclick="test('follow')">BOSS</button>
        <button class="test-btn" onclick="test('share')">SHARE</button>
        <button class="test-btn" onclick="test('multigift')">COMBO</button>
    </div>

    <div id="hud-bottom"></div>
</div>

<script src="/static/engine.js"></script>
<script src="/static/game.js"></script>
</body>
</html>
